<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f6b46" />
  <title>SugboCents - Chat with Tigom</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <script>if(localStorage.getItem("sidebarCollapsed")==="true")document.documentElement.classList.add("sidebar-collapsed");</script>
  <style>
    .chat-page-wrap {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
    }

    .chat-page-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      background: linear-gradient(135deg, #2b8259 0%, #1f6b46 100%);
      color: #fff;
      flex-shrink: 0;
    }

    .chat-page-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 1.05rem;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 150ms;
    }

    .chat-page-back:hover { background: rgba(255,255,255,0.28); }

    .chat-page-avatar {
      width: 2.8rem;
      height: 2.8rem;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      padding: 2px;
      flex-shrink: 0;
    }

    .chat-page-title { font-weight: 800; font-size: 1rem; }
    .chat-page-subtitle { font-size: 0.72rem; opacity: 0.78; }

    .chat-ai-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 0.22rem 0.6rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .chat-msg {
      display: flex;
      align-items: flex-end;
      gap: 0.4rem;
    }

    .chat-msg--bot { align-self: flex-start; }
    .chat-msg--user { align-self: flex-end; flex-direction: row-reverse; }

    .chat-msg-avatar {
      width: 1.8rem;
      height: 1.8rem;
      object-fit: contain;
      border-radius: 50%;
      background: #e8f5ee;
      padding: 2px;
      flex-shrink: 0;
    }

    .chat-bubble {
      max-width: 76%;
      padding: 0.6rem 0.9rem;
      border-radius: 1.1rem;
      font-size: 0.88rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .chat-msg--bot  .chat-bubble {
      background: #f1f5f9;
      color: #1e293b;
      border-bottom-left-radius: 0.25rem;
    }

    .chat-msg--user .chat-bubble {
      background: linear-gradient(135deg, #2b8259, #1f6b46);
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .chat-bubble-time {
      font-size: 0.65rem;
      opacity: 0.5;
      margin-top: 0.2rem;
      display: block;
    }

    /* Typing indicator */
    .chat-bubble.chat-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 3rem;
      padding: 0.65rem 0.9rem;
    }

    .chat-bubble.chat-typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: chat-dot-bounce 1.2s infinite ease-in-out;
    }

    .chat-bubble.chat-typing span:nth-child(1) { animation-delay: 0s; }
    .chat-bubble.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-bubble.chat-typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes chat-dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* Date separator */
    .chat-date-sep {
      text-align: center;
      font-size: 0.7rem;
      color: #94a3b8;
      font-weight: 600;
      margin: 0.5rem 0;
    }

    .chat-footer {
      padding: 0.65rem 0.75rem calc(0.65rem + env(safe-area-inset-bottom));
      border-top: 1px solid #f1f5f9;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-footer-input {
      flex: 1;
      border: 1.5px solid #dbe2ea;
      border-radius: 1.5rem;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      background: #f8fafb;
      color: #0f172a;
      font-family: inherit;
      transition: border-color 180ms;
      outline: none;
    }

    .chat-footer-input:focus {
      border-color: #2b8259;
      box-shadow: 0 0 0 3px rgba(31, 107, 70, 0.13);
    }

    .chat-send-btn {
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #2b8259, #1f6b46);
      color: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 150ms, transform 100ms;
    }

    .chat-send-btn:hover { opacity: 0.88; }
    .chat-send-btn:active { transform: scale(0.94); }
    .chat-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .chat-attribution {
      text-align: center;
      font-size: 0.65rem;
      color: #94a3b8;
      padding: 0.3rem 0 0.1rem;
      flex-shrink: 0;
    }

    .chat-clear-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      transition: color 150ms;
      white-space: nowrap;
    }

    .chat-clear-btn:hover { color: #fff; }

    /* Dark mode */
    .dark-mode .chat-page-wrap { background: #0f172a; }
    .dark-mode .chat-footer { border-top-color: rgba(255,255,255,0.08); }
    .dark-mode .chat-footer-input { background: #1e293b; border-color: #334155; color: #e2e8f0; }
    .dark-mode .chat-msg--bot .chat-bubble { background: #1e293b; color: #e2e8f0; }
  </style>
</head>
<body data-page="chat" data-protected="true" class="bg-mist min-h-screen antialiased">

  <div class="chat-page-wrap">
    <!-- Header -->
    <header class="chat-page-header">
      <a href="dashboard.html" class="chat-page-back" aria-label="Back to dashboard">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
      </a>
      <img
        id="chatAvatarImg"
        src="assets/images/mascot/mascot-happy.png"
        alt="Sugbo mascot"
        class="chat-page-avatar"
      />
      <div>
        <div class="chat-page-title">Sugbo</div>
        <div class="chat-page-subtitle" id="chatSubtitle">Your budget buddy</div>
      </div>
      <div class="chat-ai-badge">AI · Groq</div>
      <button id="chatClearBtn" class="chat-clear-btn" title="Clear chat history" aria-label="Clear chat history">
        <i class="bi bi-trash" aria-hidden="true"></i>
      </button>
    </header>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Attribution -->
    <div class="chat-attribution">Powered by Groq · Llama 3.1</div>

    <!-- Input footer -->
    <div class="chat-footer">
      <input
        id="chatInput"
        type="text"
        class="chat-footer-input"
        placeholder="Ask Sugbo anything…"
        maxlength="500"
        autocomplete="off"
        aria-label="Chat message"
      />
      <button id="chatSendBtn" class="chat-send-btn" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="js/firebase-init.js"></script>
  <script src="js/firebase-auth-service.js"></script>
  <script src="js/firestore-service.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dark-mode.js"></script>
  <script src="js/chat-ai.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
