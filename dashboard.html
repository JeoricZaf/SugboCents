<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f6b46" />
  <title>SugboCents - Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dashboard" data-protected="true" class="bg-mist min-h-screen antialiased">
  <main class="pb-28 pt-6 px-5 max-w-lg mx-auto">
    <header class="flex items-center justify-between">
      <div>
        <p class="eyebrow">Weekly snapshot</p>
        <h1 class="mt-1 text-2xl font-extrabold text-ink">Dashboard</h1>
      </div>
      <span id="welcomeUser" class="text-xs text-slate-600"></span>
    </header>

    <section class="budget-card mt-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-sm text-emerald-100">Remaining budget</p>
          <p id="remainingAmount" class="budget-amount">â‚±0.00</p>
          <p id="budgetSummary" class="mt-2 text-sm text-emerald-50">Set your weekly budget in Settings.</p>
        </div>
        <a href="settings.html" class="edit-chip" aria-label="Edit budget">Edit</a>
      </div>
      <div class="mt-5">
        <div class="h-2.5 rounded-full bg-emerald-900/50 overflow-hidden">
          <div id="budgetProgress" class="h-full rounded-full bg-lime-300 transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="progressLabel" class="mt-2 text-xs text-emerald-100">0% spent</p>
      </div>
    </section>

    <section class="mt-7">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold text-ink">Quick add</h2>
        <span class="text-xs text-slate-500">Tap to log expense</span>
      </div>
      <div id="quickAddGrid" class="mt-3 grid grid-cols-2 gap-3"></div>
    </section>

    <section class="mt-8">
      <h2 class="text-lg font-bold text-ink">Recent expenses</h2>
      <ul id="recentExpenseList" class="mt-3 card-panel divide-y divide-slate-100"></ul>
      <p id="emptyExpenseState" class="card-panel p-4 text-sm text-slate-500 hidden">No expenses yet. Use Quick add to log your first expense.</p>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="dashboard.html" data-nav="dashboard" class="nav-link">
      <span class="nav-icon">âŒ‚</span>
      <span class="nav-text">Dashboard</span>
    </a>
    <a href="settings.html" data-nav="settings" class="nav-link">
      <span class="nav-icon">âš™</span>
      <span class="nav-text">Settings</span>
    </a>
  </nav>

  <script src="js/firebase-init.js"></script>
  <script src="js/firebase-auth-service.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
