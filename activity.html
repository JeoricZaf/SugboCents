<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f6b46" />
  <title>SugboCents - Activity</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <script>if(localStorage.getItem("sidebarCollapsed")==="true")document.documentElement.classList.add("sidebar-collapsed");</script>
</head>
<body data-page="activity" data-protected="true" class="bg-mist min-h-screen antialiased">

  <div class="app-layout">

  <!-- sidebar nav (desktop only) -->
  <aside class="app-sidebar" aria-label="Sidebar navigation">
    <div class="sidebar-header">
      <a href="dashboard.html" class="sidebar-brand" tabindex="-1" aria-hidden="true">
        <span class="sidebar-brand-mark" aria-hidden="true">SC</span>
        <span class="sidebar-brand-name">SugboCents</span>
      </a>
      <button id="sidebarToggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="1.5" y="1.5" width="15" height="15" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 1.5v15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav-section" aria-label="Main navigation">
      <a href="dashboard.html" data-nav="dashboard" class="sidebar-nav-link" data-tooltip="Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nav-link-label">Dashboard</span>
      </a>
      <a href="activity.html" data-nav="activity" class="sidebar-nav-link" data-tooltip="Activity">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="nav-link-label">Activity</span>
      </a>
      <a href="stats.html" data-nav="stats" class="sidebar-nav-link" data-tooltip="Profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-link-label">Profile</span>
      </a>
      <a href="tigom.html" data-nav="tigom" class="sidebar-nav-link" data-tooltip="Goals">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        <span class="nav-link-label">Goals</span>
      </a>
    </nav>
    <a href="settings.html" class="sidebar-user" aria-label="Account settings">
      <div id="sidebarAvatar" class="sidebar-user-avatar">U</div>
      <div class="min-w-0 sidebar-user-info">
        <div id="sidebarName" class="sidebar-user-name">Loading…</div>
        <div class="sidebar-user-sub">Account settings</div>
      </div>
      <svg class="sidebar-user-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
    </a>
  </aside>

  <div class="app-main">
  <main class="pb-32 pt-6 px-4">
    <header class="mb-5">
      <p class="eyebrow">Expense log</p>
      <h1 class="mt-1 text-2xl font-extrabold text-ink">Activity</h1>
      <div class="xp-mini-bar mt-3" aria-label="Your progress">
        <span class="xp-mini-level" id="xpMiniLevel">
          <i class="bi bi-arrow-up-circle-fill" aria-hidden="true"></i>
          Lv. 1
        </span>
        <div class="xp-mini-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="XP progress" id="xpMiniTrack">
          <div class="xp-mini-fill" id="xpMiniFill" style="width:0%"></div>
        </div>
        <a href="stats.html" class="xp-mini-streak" id="xpMiniStreak" aria-label="View profile">
          <i class="bi bi-fire" aria-hidden="true"></i> 0
        </a>
      </div>
    </header>

    <!-- Search bar -->
    <div class="activity-search-wrap mb-3">
      <svg class="activity-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="activitySearch" type="search" class="activity-search-input" placeholder="Search expenses…" aria-label="Search expenses" autocomplete="off" />
    </div>

    <!-- Period filter chips -->
    <div class="period-filter-bar mb-2" role="group" aria-label="Filter by period">
      <button type="button" class="filter-chip" data-period="today">Today</button>
      <button type="button" class="filter-chip" data-period="week">This Week</button>
      <button type="button" class="filter-chip" data-period="month">This Month</button>
      <button type="button" class="filter-chip active" data-period="all">All Time</button>
    </div>

    <!-- Category filter chips -->
    <div id="categoryFilter" class="category-filter-bar"></div>

    <!-- Count label -->
    <p id="activityCount" class="text-xs text-slate-400 mt-2 mb-3 px-0.5"></p>

    <!-- Grouped expense list (injected by activity.js) -->
    <div id="activityList"></div>

    <!-- Empty state -->
    <div id="emptyActivity" class="card-panel p-8 text-center hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-3" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <p class="text-sm font-semibold text-slate-500">No expenses yet</p>
      <p class="text-xs text-slate-400 mt-1">Expenses you log will appear here.</p>
    </div>
  </main>
  </div><!-- /app-main -->
  </div><!-- /app-layout -->

  <!-- Undo toast -->
  <div id="undoToast" class="undo-toast hidden" role="status" aria-live="polite">
    <span id="undoToastMsg">Expense removed</span>
    <button type="button" id="undoToastBtn" class="undo-btn">Undo</button>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="dashboard.html" data-nav="dashboard" class="nav-link">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-text">Dashboard</span>
    </a>
    <a href="activity.html" data-nav="activity" class="nav-link">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-text">Activity</span>
    </a>
    <a href="tigom.html" data-nav="tigom" class="nav-link">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span class="nav-text">Goals</span>
    </a>
    <a href="stats.html" data-nav="stats" class="nav-link">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-text">Profile</span>
    </a>
    <a href="settings.html" data-nav="settings" class="nav-link">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="nav-text">Settings</span>
    </a>
  </nav>

  <script src="js/firebase-init.js"></script>
  <script src="js/firebase-auth-service.js"></script>
  <script src="js/firestore-service.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/dark-mode.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dark-mode.js"></script>
  <script src="js/activity.js"></script>
</body>
</html>
